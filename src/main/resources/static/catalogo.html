<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo de Cursos</title>
    <style>
        :root {
            --bg: #f4f2ec;
            --panel: #ffffff;
            --text: #2d2a26;
            --muted: #605b54;
            --accent: #006d77;
            --accent-2: #83c5be;
            --danger: #b42318;
            --line: #d8ddd9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 10% 20%, #dbe7e4 0%, var(--bg) 45%, #ece6dc 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .page {
            max-width: 1180px;
            margin: 0 auto;
            display: grid;
            gap: 16px;
        }

        .panel {
            background: var(--panel);
            border-radius: 14px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
            padding: 16px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.6rem;
        }

        .muted {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .auth-grid {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr 1fr 1fr;
            gap: 10px;
            align-items: end;
            margin-top: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cfd4d2;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 10px 12px;
            color: #fff;
            background: var(--accent);
            font-weight: 700;
            cursor: pointer;
        }

        button.secondary {
            background: #3f3f46;
        }

        button.danger {
            background: var(--danger);
        }

        button.ghost {
            background: #e5ebe8;
            color: #1f2937;
        }

        .status {
            margin-top: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #f6f7f8;
            min-height: 44px;
            white-space: pre-wrap;
            font-size: 0.92rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(220px, 1fr));
            gap: 12px;
        }

        .list-title {
            margin: 0 0 10px;
            font-size: 1.1rem;
        }

        .list {
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
            min-height: 220px;
            background: #fbfcfc;
        }

        .empty {
            margin: 0;
            padding: 12px;
            color: #6b7280;
            font-size: 0.92rem;
        }

        .item {
            width: 100%;
            border: 0;
            border-bottom: 1px solid var(--line);
            text-align: left;
            padding: 10px 12px;
            background: transparent;
            color: inherit;
            font-weight: 600;
            cursor: pointer;
        }

        .item small {
            display: block;
            margin-top: 3px;
            font-weight: 400;
            color: var(--muted);
        }

        .item.active {
            background: #eaf6f4;
            color: #02484f;
        }

        .viewer {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 14px;
            align-items: start;
        }

        .video-wrap {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--line);
            background: #111827;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        .meta h3 {
            margin: 0 0 6px;
        }

        .meta p {
            margin: 6px 0;
            color: var(--muted);
        }

        .toolbar {
            margin-top: 8px;
            display: flex;
            justify-content: flex-end;
        }

        @media (max-width: 980px) {
            .auth-grid {
                grid-template-columns: 1fr 1fr;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .viewer {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <section class="panel">
        <h1>Catalogo de Cursos, Modulos e Aulas</h1>
        <p class="muted">Consome os endpoints /cursos, /modulos e /aulas e reproduz o link do YouTube em iframe.</p>

        <div class="auth-grid">
            <div>
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="seu@email.com">
            </div>
            <div>
                <label for="senha">Senha</label>
                <input id="senha" type="password" placeholder="Sua senha">
            </div>
            <button id="btnLogin">Entrar</button>
            <button id="btnMe" class="secondary">Quem sou eu</button>
            <button id="btnLogout" class="danger">Sair</button>
        </div>

        <div id="status" class="status">Pronto.</div>

        <div class="toolbar">
            <button id="btnRecarregar" class="ghost">Recarregar Catalogo</button>
        </div>
    </section>

    <section class="grid">
        <article class="panel">
            <h2 class="list-title">Cursos</h2>
            <div id="listaCursos" class="list"></div>
        </article>
        <article class="panel">
            <h2 class="list-title">Modulos do Curso</h2>
            <div id="listaModulos" class="list"></div>
        </article>
        <article class="panel">
            <h2 class="list-title">Aulas do Modulo</h2>
            <div id="listaAulas" class="list"></div>
        </article>
    </section>

    <section class="panel viewer">
        <div class="video-wrap">
            <iframe id="videoFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
        <aside class="meta">
            <h3 id="aulaTitulo">Nenhuma aula selecionada</h3>
            <p id="aulaDescricao">Selecione curso, modulo e aula para carregar o video.</p>
            <p id="aulaInfo"></p>
        </aside>
    </section>
</div>

<script>
    const statusBox = document.getElementById("status");
    const TOKEN_KEY = "jm.jwt";
    const listaCursosEl = document.getElementById("listaCursos");
    const listaModulosEl = document.getElementById("listaModulos");
    const listaAulasEl = document.getElementById("listaAulas");

    const videoFrame = document.getElementById("videoFrame");
    const aulaTitulo = document.getElementById("aulaTitulo");
    const aulaDescricao = document.getElementById("aulaDescricao");
    const aulaInfo = document.getElementById("aulaInfo");

    const state = {
        cursos: [],
        modulos: [],
        aulas: [],
        cursoId: null,
        moduloId: null,
        aulaId: null
    };

    function setStatus(texto, isError = false) {
        statusBox.textContent = texto;
        statusBox.style.background = isError ? "#fef0f0" : "#f6f7f8";
    }

    function getToken() {
        return localStorage.getItem(TOKEN_KEY);
    }

    function saveToken(token) {
        if (!token) {
            return;
        }
        localStorage.setItem(TOKEN_KEY, token);
    }

    function clearToken() {
        localStorage.removeItem(TOKEN_KEY);
    }

    async function callApi(path, method = "GET", body, withAuth = true) {
        const headers = {
            "Content-Type": "application/json"
        };

        if (withAuth) {
            const token = getToken();
            if (!token) {
                throw new Error("Faça login para consumir os endpoints protegidos");
            }
            headers.Authorization = `Bearer ${token}`;
        }

        const response = await fetch(path, {
            method,
            headers,
            body: body ? JSON.stringify(body) : undefined
        });

        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
            throw new Error(payload.mensagem || payload.error || "Erro na requisicao");
        }

        return payload;
    }

    function toEmbedUrl(link) {
        if (!link) {
            return "";
        }

        if (link.includes("youtube.com/embed/")) {
            return link;
        }

        try {
            const url = new URL(link);

            if (url.hostname.includes("youtu.be")) {
                const id = url.pathname.replace("/", "");
                return id ? `https://www.youtube.com/embed/${id}` : "";
            }

            if (url.hostname.includes("youtube.com")) {
                const id = url.searchParams.get("v");
                return id ? `https://www.youtube.com/embed/${id}` : "";
            }
        } catch (e) {
            return "";
        }

        return "";
    }

    function renderList(container, items, selectedId, labelBuilder, onClick, emptyMessage) {
        container.innerHTML = "";

        if (!items.length) {
            const p = document.createElement("p");
            p.className = "empty";
            p.textContent = emptyMessage;
            container.appendChild(p);
            return;
        }

        items.forEach((item) => {
            const btn = document.createElement("button");
            btn.className = "item" + (selectedId === item.id ? " active" : "");
            btn.type = "button";
            btn.innerHTML = labelBuilder(item);
            btn.addEventListener("click", () => onClick(item));
            container.appendChild(btn);
        });
    }

    function renderCursos() {
        renderList(
            listaCursosEl,
            state.cursos,
            state.cursoId,
            (curso) => `${curso.nome}<small>Id: ${curso.id} | Valor: ${curso.valor ?? "-"}</small>`,
            (curso) => {
                state.cursoId = curso.id;
                state.moduloId = null;
                state.aulaId = null;
                renderModulos();
                renderAulas();
                clearViewer();
                renderCursos();
            },
            "Nenhum curso cadastrado."
        );
    }

    function renderModulos() {
        const modulosCurso = state.modulos
            .filter((m) => m.cursoId === state.cursoId)
            .sort((a, b) => (a.ordem ?? 0) - (b.ordem ?? 0));

        renderList(
            listaModulosEl,
            modulosCurso,
            state.moduloId,
            (modulo) => `${modulo.titulo}<small>Id: ${modulo.id} | Ordem: ${modulo.ordem ?? "-"}</small>`,
            (modulo) => {
                state.moduloId = modulo.id;
                state.aulaId = null;
                renderAulas();
                clearViewer();
                renderModulos();
            },
            state.cursoId ? "Nenhum modulo para este curso." : "Selecione um curso primeiro."
        );
    }

    function renderAulas() {
        const aulasModulo = state.aulas
            .filter((a) => a.moduloId === state.moduloId)
            .sort((a, b) => (a.ordem ?? 0) - (b.ordem ?? 0));

        renderList(
            listaAulasEl,
            aulasModulo,
            state.aulaId,
            (aula) => `${aula.titulo}<small>Id: ${aula.id} | Ordem: ${aula.ordem ?? "-"}</small>`,
            (aula) => {
                state.aulaId = aula.id;
                renderViewer(aula);
                renderAulas();
            },
            state.moduloId ? "Nenhuma aula para este modulo." : "Selecione um modulo primeiro."
        );
    }

    function clearViewer() {
        videoFrame.src = "";
        aulaTitulo.textContent = "Nenhuma aula selecionada";
        aulaDescricao.textContent = "Selecione curso, modulo e aula para carregar o video.";
        aulaInfo.textContent = "";
    }

    function renderViewer(aula) {
        const embedUrl = toEmbedUrl(aula.linkYoutube);

        if (!embedUrl) {
            videoFrame.src = "";
            aulaTitulo.textContent = aula.titulo || "Aula sem titulo";
            aulaDescricao.textContent = aula.descricao || "Sem descricao";
            aulaInfo.textContent = "Link de video invalido para iframe.";
            return;
        }

        videoFrame.src = embedUrl;
        aulaTitulo.textContent = aula.titulo || "Aula sem titulo";
        aulaDescricao.textContent = aula.descricao || "Sem descricao";
        aulaInfo.textContent = `Aula ID ${aula.id} | Modulo ID ${aula.moduloId}`;
    }

    async function carregarCatalogo() {
        try {
            setStatus("Carregando catalogo...");

            const [cursos, modulos, aulas] = await Promise.all([
                callApi("/cursos"),
                callApi("/modulos"),
                callApi("/aulas")
            ]);

            state.cursos = Array.isArray(cursos) ? cursos : [];
            state.modulos = Array.isArray(modulos) ? modulos : [];
            state.aulas = Array.isArray(aulas) ? aulas : [];

            state.cursoId = null;
            state.moduloId = null;
            state.aulaId = null;

            renderCursos();
            renderModulos();
            renderAulas();
            clearViewer();

            setStatus(`Catalogo carregado: ${state.cursos.length} cursos, ${state.modulos.length} modulos, ${state.aulas.length} aulas.`);
        } catch (err) {
            setStatus(err.message, true);
        }
    }

    document.getElementById("btnLogin").addEventListener("click", async () => {
        const email = document.getElementById("email").value.trim();
        const senha = document.getElementById("senha").value;

        try {
            const data = await callApi("/auth/login", "POST", { email, senha }, false);
            saveToken(data.token);
            setStatus(`Login OK: ${data.nome} (${data.email})`);
            await carregarCatalogo();
        } catch (err) {
            setStatus(err.message, true);
        }
    });

    document.getElementById("btnMe").addEventListener("click", async () => {
        try {
            const data = await callApi("/auth/me", "GET");
            setStatus(`Sessao ativa: ${data.nome} (${data.email}) - ${data.role}`);
        } catch (err) {
            setStatus(err.message, true);
        }
    });

    document.getElementById("btnLogout").addEventListener("click", async () => {
        try {
            const data = await callApi("/auth/logout", "POST");
            clearToken();
            state.cursos = [];
            state.modulos = [];
            state.aulas = [];
            state.cursoId = null;
            state.moduloId = null;
            state.aulaId = null;
            renderCursos();
            renderModulos();
            renderAulas();
            clearViewer();
            setStatus(data.mensagem || "Logout realizado");
        } catch (err) {
            setStatus(err.message, true);
        }
    });

    document.getElementById("btnRecarregar").addEventListener("click", carregarCatalogo);

    if (getToken()) {
        carregarCatalogo();
    } else {
        setStatus("Faça login para carregar o catálogo.");
    }
</script>
</body>
</html>
